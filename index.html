<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Clicker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script>
        (function() {
            const s = document.createElement('script');
            s.src = "https://sad.adsgram.ai/js/sad.min.js?v=" + Date.now();
            s.async = true;
            document.head.appendChild(s);
        })();
    </script>

    <style>
        :root {
            --bg-body: #08080f; --bg-card: rgba(255, 255, 255, 0.04); --card-border: rgba(255, 255, 255, 0.08);
            --color-text-primary: #fff; --color-text-secondary: rgba(255, 255, 255, 0.6);
            --color-accent: #9d50bb; --ad-btn-bg: #6c5ce7; --progress-bg: #1a1a2e;
        }
        body.theme-grey { --color-accent: #777; --ad-btn-bg: #333; }
        body.theme-lime { --color-accent: #32ff7e; --ad-btn-bg: #1a4f31; }
        body.theme-purple { --color-accent: #9d50bb; --ad-btn-bg: #6c5ce7; }

        body {
            background-color: var(--bg-body); color: var(--color-text-primary); font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh;
            overflow-x: hidden; -webkit-user-select: none; box-sizing: border-box; padding: 15px; padding-top: 80px; transition: 0.3s;
        }

        .top-bar { position: absolute; top: 20px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .theme-row { display: flex; gap: 8px; }
        .dot { width: 24px; height: 24px; border-radius: 7px; border: 2px solid white; cursor: pointer; }
        .lang-btn { background: var(--bg-card); border: 1px solid var(--card-border); color: white; font-family: 'Montserrat'; font-weight: 900; font-size: 11px; padding: 5px 10px; border-radius: 8px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; margin-bottom: 15px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 18px; padding: 12px 8px; text-align: center; }
        .stat-icon { font-size: 16px; margin-bottom: 8px; display: block; opacity: 0.8; }
        .stat-val { font-size: 13px; font-weight: 900; display: block; margin-bottom: 2px; }
        .stat-lbl { font-size: 8px; color: var(--color-text-secondary); text-transform: uppercase; }

        .card { width: 100%; background: var(--bg-card); border-radius: 24px; border: 1px solid var(--card-border); box-sizing: border-box; padding: 20px; margin-bottom: 12px; }
        .label { font-size: 11px; color: var(--color-text-secondary); font-weight: 700; text-transform: uppercase; }
        .balance-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        #score { font-size: 40px; font-weight: 900; }
        .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--color-text-secondary); margin: 15px 0 6px 0; }
        .progress-bg { width: 100%; height: 8px; background: var(--progress-bg); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--color-accent); width: 0%; transition: width 0.4s; box-shadow: 0 0 10px var(--color-accent); }

        .ads-row { display: flex; gap: 10px; width: 100%; margin-bottom: 12px; }
        .ad-button { flex: 1; padding: 18px 10px; border: none; border-radius: 22px; color: white; font-weight: 900; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; cursor: pointer; }
        #ad-btn { background: var(--ad-btn-bg); }
        #boost-btn { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .ad-button:disabled { opacity: 0.5; filter: grayscale(1); }

        #toast { position: fixed; top: -120px; left: 50%; transform: translateX(-50%); background: var(--bg-card); border: 2px solid var(--color-accent); padding: 15px 20px; border-radius: 20px; z-index: 2000; transition: 0.5s; text-align: center; width: 85%; backdrop-filter: blur(10px); }
        #toast.show { top: 15px; }

        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--color-accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .shop { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin: 10px 0; }
        .upgrade { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; }
        .upgrade b { display: block; font-size: 12px; margin-bottom: 5px; }
        .upgrade span { color: #ffca28; font-weight: 900; font-size: 14px; }

        .click-area { padding: 30px; text-align: center; cursor: pointer; border-radius: 30px; transition: 0.1s; }
        .click-area:active { transform: scale(0.95); background: rgba(255,255,255,0.08); }

        .leader-item { display: flex; justify-content: space-between; padding: 14px 18px; background: var(--bg-card); border-radius: 16px; margin-bottom: 6px; font-size: 12px; border: 1px solid var(--card-border); }
        .my-rank { border: 1px solid var(--color-accent) !important; background: rgba(157, 80, 187, 0.1); }
    </style>
</head>
<body class="theme-purple">

    <div id="loader-overlay"><div class="spinner"></div><b id="wait-txt">Подождите...</b></div>
    <div id="toast"><b id="t-reward-t">Награда!</b><br><span id="t-reward-m">+1000 ⭐</span></div>

    <div class="top-bar">
        <div class="theme-row">
            <div class="dot" style="background: #444;" onclick="setTheme('grey')"></div>
            <div class="dot" style="background: #9d50bb;" onclick="setTheme('purple')"></div>
            <div class="dot" style="background: #32ff7e;" onclick="setTheme('lime')"></div>
        </div>
        <div class="lang-row">
            <button class="lang-btn" onclick="changeLang('ru')">RU</button>
            <button class="lang-btn" onclick="changeLang('en')">EN</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-icon">👁️</span>
            <span class="stat-val" id="st-total">0</span>
            <span class="stat-lbl" id="st-lbl-1">Всего</span>
        </div>
        <div class="stat-card">
            <span class="stat-icon">⭐</span>
            <span class="stat-val" id="st-today">0</span>
            <span class="stat-lbl" id="st-lbl-2">Сегодня</span>
        </div>
        <div class="stat-card">
            <span class="stat-icon">🎯</span>
            <span class="stat-val" id="st-hour">0 / 1000</span>
            <span class="stat-lbl" id="st-lbl-3">За час</span>
        </div>
    </div>

    <div class="card">
        <span class="label" id="lbl-bal">Ваш баланс</span>
        <div class="balance-row">
            <span style="font-size: 30px; color: #ffca28;">⭐</span>
            <span id="score">0</span>
        </div>
        <div class="progress-info">
            <span id="lbl-goal">Цель: 1000 ⭐</span>
            <span id="prog-val">0 / 1000</span>
        </div>
        <div class="progress-bg"><div class="progress-fill" id="pb"></div></div>
    </div>

    <div class="ads-row">
        <button id="ad-btn" class="ad-button" onclick="showAd()">▶ <span id="ad-btn-txt">Реклама</span></button>
        <button id="boost-btn" class="ad-button" onclick="showBoostAd()">🚀 <span id="boost-btn-txt">Буст x2</span></button>
    </div>

    <div class="shop">
        <div class="upgrade" onclick="buyUpgrade('click')"><b id="up-mc">МУЛЬТИКЛИК</b><span id="c-cost">100</span> ⭐</div>
        <div class="upgrade" onclick="buyUpgrade('auto')"><b id="up-ab">АВТО-БОТ</b><span id="a-cost">500</span> ⭐</div>
    </div>

    <div class="card click-area" onclick="clickStar()">
        <span style="font-size: 60px;">⭐</span>
    </div>

    <div style="width:100%">
        <b class="label" id="lbl-top">Топ игроков</b>
        <div id="leaderboard-content">
            </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe?.user?.id || 'guest';
        const userDisplayName = tg.initDataUnsafe?.user?.first_name || "Player";
        const p = (key) => `u${userId}_${key}`;

        // ДАННЫЕ
        let balance = Number(localStorage.getItem(p('bal'))) || 0;
        let dpc = Number(localStorage.getItem(p('dpc'))) || 1;
        let dps = Number(localStorage.getItem(p('dps'))) || 0;
        let cCost = Number(localStorage.getItem(p('cCost'))) || 100;
        let aCost = Number(localStorage.getItem(p('aCost'))) || 500;
        let totalViews = Number(localStorage.getItem(p('stTotal'))) || 0;
        let earnedToday = Number(localStorage.getItem(p('stToday'))) || 0;
        let hourlyViews = Number(localStorage.getItem(p('stHour'))) || 0;
        let lastHour = Number(localStorage.getItem(p('lastH'))) || new Date().getHours();
        let currentLang = localStorage.getItem(p('lang')) || 'ru';
        let boostActive = false;

        const i18n = {
            ru: { bal: "Ваш баланс", goal: "Цель", mc: "МУЛЬТИКЛИК", ab: "АВТО-БОТ", top: "Топ игроков", wait: "Подождите...", s1: "Всего", s2: "Сегодня", s3: "За час", ad: "Реклама", bst: "Буст x2", rewT: "Награда!" },
            en: { bal: "Balance", goal: "Goal", mc: "MULTICLICK", ab: "AUTO-BOT", top: "Leaderboard", wait: "Please wait...", s1: "Total", s2: "Today", s3: "Hourly", ad: "Ad", bst: "Boost x2", rewT: "Reward!" }
        };

        // Инициализация AdsGram
        let AdController;
        window.addEventListener('load', () => {
            if (window.Adsgram) {
                AdController = window.Adsgram.init({ blockId: "29401" });
            }
        });

        function updateUI() {
            const t = i18n[currentLang];
            const fmt = (v) => Math.floor(v).toLocaleString();

            // Сброс часового лимита
            let nowH = new Date().getHours();
            if (nowH !== lastHour) { hourlyViews = 0; lastHour = nowH; save(); }

            document.getElementById('score').innerText = fmt(balance);
            document.getElementById('st-total').innerText = fmt(totalViews);
            document.getElementById('st-today').innerText = fmt(earnedToday);
            document.getElementById('st-hour').innerText = `${hourlyViews} / 1000`;
            document.getElementById('c-cost').innerText = fmt(cCost);
            document.getElementById('a-cost').innerText = fmt(aCost);
            
            document.getElementById('lbl-bal').innerText = t.bal;
            document.getElementById('lbl-top').innerText = t.top;
            document.getElementById('st-lbl-1').innerText = t.s1;
            document.getElementById('st-lbl-2').innerText = t.s2;
            document.getElementById('st-lbl-3').innerText = t.s3;
            document.getElementById('wait-txt').innerText = t.wait;
            document.getElementById('up-mc').innerText = t.mc;
            document.getElementById('up-ab').innerText = t.ab;
            document.getElementById('ad-btn-txt').innerText = t.ad;
            if(!boostActive) document.getElementById('boost-btn-txt').innerText = t.bst;

            let nextGoal = Math.ceil((balance + 1) / 1000) * 1000 || 1000;
            let progress = balance % 1000;
            document.getElementById('lbl-goal').innerText = `${t.goal}: ${fmt(nextGoal)} ⭐`;
            document.getElementById('prog-val').innerText = `${fmt(progress)} / 1000`;
            document.getElementById('pb').style.width = (progress / 10) + '%';
            
            loadTop();
        }

        function showAd() {
            if(!AdController) return;
            const overlay = document.getElementById('loader-overlay');
            overlay.style.display = 'flex';
            AdController.show().then(res => {
                if(res.done) {
                    balance += 1000; totalViews++; earnedToday += 1000; hourlyViews++;
                    showToast("+1000 ⭐");
                    updateUI(); save();
                }
            }).finally(() => { overlay.style.display = 'none'; });
        }

        function showBoostAd() {
            if(boostActive || !AdController) return;
            document.getElementById('loader-overlay').style.display = 'flex';
            AdController.show().then(res => {
                if(res.done) {
                    boostActive = true; let time = 60;
                    const btn = document.getElementById('boost-btn'); btn.disabled = true;
                    const tm = setInterval(() => {
                        document.getElementById('boost-btn-txt').innerText = time + 's'; time--;
                        if(time < 0) { clearInterval(tm); boostActive = false; btn.disabled = false; updateUI(); }
                    }, 1000);
                }
            }).finally(() => { document.getElementById('loader-overlay').style.display = 'none'; });
        }

        function clickStar() { balance += (boostActive ? dpc * 2 : dpc); updateUI(); save(); }
        
        function buyUpgrade(type) {
            if(type === 'click' && balance >= cCost) { balance -= cCost; dpc++; cCost = Math.floor(cCost * 1.6); }
            if(type === 'auto' && balance >= aCost) { balance -= aCost; dps++; aCost = Math.floor(aCost * 1.6); }
            updateUI(); save();
        }

        function save() {
            localStorage.setItem(p('bal'), balance); localStorage.setItem(p('dpc'), dpc);
            localStorage.setItem(p('dps'), dps); localStorage.setItem(p('cCost'), cCost);
            localStorage.setItem(p('aCost'), aCost); localStorage.setItem(p('stTotal'), totalViews);
            localStorage.setItem(p('stToday'), earnedToday); localStorage.setItem(p('stHour'), hourlyViews);
            localStorage.setItem(p('lastH'), lastHour); localStorage.setItem(p('lang'), currentLang);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('t-reward-m').innerText = msg;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        function setTheme(t) { document.body.className = 'theme-' + t; }
        function changeLang(l) { currentLang = l; updateUI(); }

        function loadTop() {
            const players = [
                {n: "КИТ_ИНВЕСТОР", s: 1200500}, 
                {n: userDisplayName, s: balance, me: true}, 
                {n: "ZROUTX_FAN", s: 85000},
                {n: "CRYPTO_BRO", s: 15400}
            ].sort((a,b) => b.s - a.s);
            
            document.getElementById('leaderboard-content').innerHTML = players.map((pl, i) => `
                <div class="leader-item ${pl.me?'my-rank':''}">
                    <span>${i+1}. ${pl.n}</span>
                    <b>${pl.s.toLocaleString()}</b>
                </div>
            `).join('');
        }

        setInterval(() => { if(dps > 0) { balance += dps; updateUI(); save(); } }, 1000);
        
        updateUI();
        tg.ready();
    </script>
</body>
</html>
