<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Clicker Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            --accent: #9d50bb;
        }
        
        body {
            background: var(--bg-grad);
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            height: 100vh;
            transition: 0.5s;
            overflow: hidden;
        }

        body.theme-grey { --bg-grad: linear-gradient(135deg, #434343 0%, #000000 100%); --accent: #888; }
        body.theme-purple { --bg-grad: linear-gradient(135deg, #6e48aa 0%, #9d50bb 100%); --accent: #fff; }
        body.theme-lime { --bg-grad: linear-gradient(135deg, #0f2027 0%, #2c5364 50%, #71b280 100%); --accent: #32ff7e; }

        .header { margin-top: 30px; text-align: center; width: 90%; }
        #level-text { font-size: 14px; opacity: 0.7; letter-spacing: 2px; margin-bottom: 5px; }
        #score { font-size: 60px; font-weight: 900; margin: 5px 0; text-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        .progress-container { width: 80%; background: rgba(255,255,255,0.1); border-radius: 50px; height: 14px; margin: 0 auto 40px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: 0.4s; box-shadow: 0 0 15px var(--accent); }

        #coin {
            width: 240px;
            height: 240px;
            background: rgba(255,255,255,0.03);
            border: 10px solid rgba(255,255,255,0.05);
            border-radius: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
            cursor: pointer;
            transition: 0.1s;
            user-select: none;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        #coin:active { transform: scale(0.94); }

        .leaderboard {
            margin-top: auto;
            width: 100%;
            background: rgba(0,0,0,0.4);
            border-radius: 40px 40px 0 0;
            padding: 25px;
            box-sizing: border-box;
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .leader-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            margin: 8px 0;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 16px;
        }
        .my-score { border: 2px solid var(--accent); background: rgba(255,255,255,0.1); }

        .theme-switcher { position: absolute; top: 20px; right: 20px; display: flex; gap: 12px; }
        .theme-dot { width: 30px; height: 30px; border-radius: 10px; border: 2px solid white; cursor: pointer; }

        .btn-ad {
            margin: 25px 0;
            padding: 18px 45px;
            background: #fff;
            color: #000;
            border-radius: 25px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="theme-purple">

    <div class="theme-switcher">
        <div class="theme-dot" style="background: #434343;" onclick="setTheme('grey')"></div>
        <div class="theme-dot" style="background: #9d50bb;" onclick="setTheme('purple')"></div>
        <div class="theme-dot" style="background: #71b280;" onclick="setTheme('lime')"></div>
    </div>

    <div class="header">
        <div id="level-text">LEVEL 1</div>
        <div id="score">0</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="coin">⭐</div>

    <button class="btn-ad" onclick="showAd()">📺 BOOST +1000</button>

    <div class="leaderboard">
        <div style="margin-bottom: 15px; font-size: 12px; opacity: 0.5; letter-spacing: 2px;">TOP PLAYERS</div>
        <div class="leader-item"><span>1. RICH_GUY</span><span>2,500,000</span></div>
        <div class="leader-item my-score"><span>3. YOU (aqt)</span><span id="player-score">0</span></div>
    </div>

    <script>
        let balance = 0;
        let nextLevel = 100;
        let level = 1;

        // ТВОЙ ID УЖЕ ТУТ:
        const AdController = window.Adsgram.init({ blockId: "29361" });

        function setTheme(t) { document.body.className = 'theme-' + t; }

        document.getElementById('coin').onclick = () => {
            balance += 1;
            updateUI();
        };

        function updateUI() {
            document.getElementById('score').innerText = balance.toLocaleString();
            document.getElementById('player-score').innerText = balance.toLocaleString();
            
            if (balance >= nextLevel) {
                level++;
                nextLevel *= 2;
                document.getElementById('level-text').innerText = "LEVEL " + level;
            }
            
            let prog = (balance / nextLevel) * 100;
            document.getElementById('progress-bar').style.width = prog + "%";
        }

        async function showAd() {
            try {
                const result = await AdController.show();
                if (result.done) {
                    balance += 1000;
                    updateUI();
                }
            } catch (e) {
                alert("Реклама подгружается или статус Pending в Adsgram.");
            }
        }
    </script>
</body>
</html>
