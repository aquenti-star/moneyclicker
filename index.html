<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Clicker</title>
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .grad-border { padding: 3px; background: linear-gradient(45deg, #8a2be2, #4b0082, #9400d3); border-radius: 16px; }
        #adBtn { background: #1a002e; color: #fff; padding: 18px 45px; border: none; border-radius: 14px; font-size: 22px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1 style="color: #8a2be2;">Money Clicker</h1>
    <div class="grad-border">
        <button id="adBtn">СМОТРЕТЬ</button>
    </div>
    <script>
        document.getElementById('adBtn').onclick = () => {
            if (window.Adsgram) {
                const AdController = window.Adsgram.init({ blockId: "29335" });
                AdController.show()
                    .then(() => { alert("Успех! +10 монет."); })
                    .catch((err) => { alert("Adsgram: " + (err.description || "Реклама подбирается...")); });
            } else {
                alert("Ошибка: Скрипт не загружен.");
            }
        };
    </script>
</body>
</html>
