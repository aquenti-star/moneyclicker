<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Money Clicker</title>
    <script src="https://adsgram.ai/sdk.js"></script>
</head>
<body style="background: #000; color: #fff; text-align: center; font-family: sans-serif;">
    <h1>Money Clicker</h1>
    <button id="adBtn" style="padding: 15px 30px; font-size: 20px; border-radius: 10px; background: #0088cc; color: #fff; border: none;">
        СМОТРЕТЬ РЕКЛАМУ (+10 монет)
    </button>

    <script>
        const AdController = window.Adsgram.init({ blockId: "ЗДЕСЬ_ТВОЙ_ID" });
        document.getElementById('adBtn').onclick = () => {
            AdController.show().then(() => { alert("Начислено!"); }).catch(() => { alert("Ошибка!"); });
        };
    </script>
</body>
</html>
