<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Clicker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        :root { --bg: #0f0f1a; --accent: #9d50bb; --card: rgba(255,255,255,0.05); }
        body {
            background: var(--bg); color: white; font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh;
            overflow-x: hidden; -webkit-user-select: none; user-select: none;
        }
        .header { width: 90%; text-align: center; margin-top: 20px; }
        #score { font-size: 50px; margin: 10px 0; text-shadow: 0 0 20px var(--accent); }
        
        #coin {
            width: 200px; height: 200px; background: var(--card); border: 8px solid rgba(255,255,255,0.1);
            border-radius: 60px; display: flex; align-items: center; justify-content: center;
            font-size: 90px; transition: transform 0.05s; margin: 20px 0; touch-action: manipulation;
        }
        #coin:active { transform: scale(0.92); }

        .shop { width: 90%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .upgrade {
            background: var(--card); padding: 15px; border-radius: 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); font-size: 12px;
        }
        .upgrade b { color: var(--accent); display: block; font-size: 14px; }
        .upgrade.locked { opacity: 0.5; }

        .btn-ad {
            width: 90%; padding: 15px; background: #fff; color: #000; border-radius: 20px;
            border: none; font-weight: 900; margin: 20px 0; font-size: 14px;
        }

        .leaderboard { width: 100%; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 30px 30px 0 0; margin-top: auto; }
        .leader-item { display: flex; justify-content: space-between; padding: 10px 20px; background: var(--card); border-radius: 15px; margin: 5px 0; font-size: 13px; }
        .my-score { border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <div id="level-text" style="font-size: 12px; opacity: 0.6;">LEVEL 1</div>
        <div id="score">0</div>
        <div style="font-size: 12px; opacity: 0.6;">DPC: <span id="dpc-val">1</span> | DPS: <span id="dps-val">0</span></div>
    </div>

    <div id="coin" onclick="clickStar()">⭐</div>

    <div class="shop">
        <div class="upgrade" onclick="buyUpgrade('click')">
            <b>MULTICLICK</b>
            Cost: <span id="c-cost">100</span>
        </div>
        <div class="upgrade" onclick="buyUpgrade('auto')">
            <b>AUTO-BOT</b>
            Cost: <span id="a-cost">500</span>
        </div>
    </div>

    <button class="btn-ad" onclick="showAd()">📺 REWARD +1000</button>

    <div class="leaderboard">
        <div class="leader-item"><span>1. КИТ_ИНВЕСТОР</span><span>1,200,500</span></div>
        <div class="leader-item my-score"><span>2. ТЫ (Player)</span><span id="player-score">0</span></div>
        <div class="leader-item"><span>3. ZROUTX_FAN</span><span>85,000</span></div>
    </div>

    <script>
        // ЗАГРУЗКА ДАННЫХ
        let balance = Number(localStorage.getItem('bal')) || 0;
        let dpc = Number(localStorage.getItem('dpc')) || 1;
        let dps = Number(localStorage.getItem('dps')) || 0;
        let cCost = Number(localStorage.getItem('cCost')) || 100;
        let aCost = Number(localStorage.getItem('aCost')) || 500;

        const AdController = window.Adsgram.init({ blockId: "29361" });

        function clickStar() {
            balance += dpc;
            updateUI();
            save();
        }

        function buyUpgrade(type) {
            if (type === 'click' && balance >= cCost) {
                balance -= cCost;
                dpc += 1;
                cCost = Math.floor(cCost * 1.5);
            } else if (type === 'auto' && balance >= aCost) {
                balance -= aCost;
                dps += 1;
                aCost = Math.floor(aCost * 1.5);
            }
            updateUI();
            save();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('player-score').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('dpc-val').innerText = dpc;
            document.getElementById('dps-val').innerText = dps;
            document.getElementById('c-cost').innerText = cCost;
            document.getElementById('a-cost').innerText = aCost;
            
            let lvl = Math.floor(balance / 1000) + 1;
            document.getElementById('level-text').innerText = "LEVEL " + lvl;
        }

        function save() {
            localStorage.setItem('bal', balance);
            localStorage.setItem('dpc', dpc);
            localStorage.setItem('dps', dps);
            localStorage.setItem('cCost', cCost);
            localStorage.setItem('aCost', aCost);
        }

        // Авто-клик раз в секунду
        setInterval(() => {
            if (dps > 0) {
                balance += dps;
                updateUI();
                save();
            }
        }, 1000);

        async function showAd() {
            try {
                const result = await AdController.show();
                if (result.done) {
                    balance += 1000;
                    updateUI();
                    save();
                }
            } catch (e) { alert("Реклама загружается.."); }
        }

        updateUI(); // Запуск при старте
    </script>
</body>
</html>
