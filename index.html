<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Star Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            background: #000; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;
            -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #score { font-size: 50px; font-weight: bold; margin-bottom: 20px; }
        .star { font-size: 100px; cursor: pointer; transition: 0.1s; }
        .star:active { transform: scale(0.9); }
        .ad-btn {
            margin-top: 30px; background: #5865f2; border: none; color: white;
            padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer;
        }
        .ad-btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div id="score">0</div>
    <div class="star" id="star-click">⭐</div>
    <button class="ad-btn" id="ad">ПОЛУЧИТЬ +1000 ⭐</button>

    <script>
        const tg = window.Telegram.WebApp;
        let score = Number(localStorage.getItem('score')) || 0;

        function updateUI() {
            document.getElementById('score').innerText = score.toLocaleString();
        }

        // Клик по звезде
        const star = document.getElementById('star-click');
        star.addEventListener('click', () => {
            score++;
            updateUI();
            localStorage.setItem('score', score);
        });

        // Инициализация AdsGram строго по доке
        const AdController = window.Adsgram.init({ blockId: "29401" });
        const button = document.getElementById('ad');

        // Показ рекламы строго по структуре из доки
        button.addEventListener('click', () => {
            button.disabled = true;

            AdController.show().then((result) => {
                // Пользователь просмотрел рекламу до конца
                if (result.done) {
                    score += 1000;
                    updateUI();
                    localStorage.setItem('score', score);
                }
            }).catch((result) => {
                // Ошибка при воспроизведении рекламы
                console.log("Ad error:", result);
            }).finally(() => {
                // Разблокируем кнопку в любом случае
                button.disabled = false;
            });
        });

        updateUI();
        tg.ready();
    </script>
</body>
</html>
