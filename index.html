<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AdsGram Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            background: #08080f; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;
            -webkit-user-select: none; user-select: none;
        }
        .ad-btn {
            background: #5865f2; border: none; color: white;
            padding: 20px 40px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase;
        }
        .ad-btn:disabled { opacity: 0.5; }
        #status { margin-top: 20px; font-size: 14px; color: #888; text-align: center; max-width: 80%; line-height: 1.5; }
    </style>
</head>
<body>

    <button class="ad-btn" id="ad-btn" onclick="showAd()">Смотреть рекламу</button>
    <div id="status">Ждем клика...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Инициализация твоего блока
        const AdController = window.Adsgram.init({ blockId: "29401" });

        function showAd() {
            const btn = document.getElementById('ad-btn');
            const statusDiv = document.getElementById('status');
            
            btn.disabled = true;
            statusDiv.innerText = "Загрузка рекламы...";
            statusDiv.style.color = "#aaa";
            
            // Вызов строго по документации
            AdController.show().then((result) => {
                if (result.done) {
                    statusDiv.innerText = "✅ Успех! result.done = true\nКод отработал идеально, просмотр засчитан внутри приложения.";
                    statusDiv.style.color = "#4ade80";
                } else {
                    statusDiv.innerText = "⚠️ Реклама закрыта до конца (result.done = false)";
                    statusDiv.style.color = "#fbbf24";
                }
            }).catch((err) => {
                statusDiv.innerText = "❌ Ошибка: " + JSON.stringify(err);
                statusDiv.style.color = "#f87171";
            }).finally(() => {
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
