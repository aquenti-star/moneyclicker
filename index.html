<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Clicker</title>
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* Стильная фиолетовая кнопка с градиентной обводкой */
        .btn-container {
            position: relative;
            padding: 3px; /* Толщина обводки */
            border-radius: 15px;
            background: linear-gradient(45deg, #8a2be2, #4b0082, #9400d3);
            display: inline-block;
        }

        #adBtn {
            background-color: #2e004f; /* Темно-фиолетовый фон кнопки */
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: transform 0.1s;
        }

        #adBtn:active {
            transform: scale(0.95);
            background-color: #3d0066;
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 30px;">Money Clicker</h1>

    <div class="btn-container">
        <button id="adBtn">СМОТРЕТЬ</button>
    </div>

    <script>
        // Инициализация рекламы с твоим ID
        const AdController = window.Adsgram.init({ blockId: "29335" });

        document.getElementById('adBtn').onclick = () => {
            console.log("Кнопка нажата, запуск рекламы...");
            
            AdController.show()
                .then((result) => {
                    // Код при успешном просмотре
                    alert("Успешно! +10 монет на баланс.");
                })
                .catch((result) => {
                    // Код при ошибке или если реклама не готова
                    console.error("Ошибка Adsgram:", result);
                    alert("Реклама пока не загрузилась. Попробуй через пару минут!");
                });
        };
    </script>
</body>
</html>
