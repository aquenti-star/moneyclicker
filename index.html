<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Clicker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        :root { --bg: #0f0f1a; --accent: #9d50bb; --card: rgba(255,255,255,0.05); }
        body {
            background: var(--bg); color: white; font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh;
            overflow-x: hidden; -webkit-user-select: none; user-select: none; transition: 0.3s;
        }
        body.theme-grey { --bg: #222; --accent: #777; }
        body.theme-purple { --bg: #0f0f1a; --accent: #9d50bb; }
        body.theme-lime { --bg: #0b1a0f; --accent: #32ff7e; }

        .top-bar { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; z-index: 10; }
        .row { display: flex; gap: 8px; }
        .dot { width: 26px; height: 26px; border-radius: 8px; border: 2px solid white; cursor: pointer; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; font-family: 'Montserrat'; font-weight: 900; font-size: 10px; padding: 5px 10px; border-radius: 8px; cursor: pointer; }

        .header { width: 90%; text-align: center; margin-top: 60px; }
        #score { font-size: 50px; margin: 10px 0; text-shadow: 0 0 20px var(--accent); }
        
        #coin {
            width: 200px; height: 200px; background: var(--card); border: 8px solid rgba(255,255,255,0.1);
            border-radius: 60px; display: flex; align-items: center; justify-content: center;
            font-size: 90px; transition: transform 0.05s; margin: 20px 0; touch-action: manipulation;
        }
        #coin:active { transform: scale(0.92); }

        .shop { width: 90%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .upgrade { background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .upgrade b { color: var(--accent); display: block; font-size: 12px; margin-bottom: 5px; }
        .upgrade span { font-size: 10px; opacity: 0.8; }

        .btn-ad { width: 90%; padding: 18px; background: #fff; color: #000; border-radius: 20px; border: none; font-weight: 900; margin: 20px 0; font-size: 14px; }

        .leaderboard { width: 100%; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 30px 30px 0 0; margin-top: auto; box-sizing: border-box; }
        .leader-item { display: flex; justify-content: space-between; padding: 12px 20px; background: var(--card); border-radius: 15px; margin: 5px 0; font-size: 12px; }
        .my-score { border: 1px solid var(--accent); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="theme-purple">

    <div class="top-bar">
        <div class="row">
            <div class="dot" style="background: #444;" onclick="setTheme('grey')"></div>
            <div class="dot" style="background: #9d50bb;" onclick="setTheme('purple')"></div>
            <div class="dot" style="background: #32ff7e;" onclick="setTheme('lime')"></div>
        </div>
        <div class="row">
            <button class="lang-btn" onclick="changeLang('ru')">RU</button>
            <button class="lang-btn" onclick="changeLang('en')">ENG</button>
        </div>
    </div>

    <div class="header">
        <div id="lvl-txt">LEVEL 1</div>
        <div id="score">0</div>
        <div style="font-size: 11px; opacity: 0.6;">DPC: <span id="dpc-val">1</span> | DPS: <span id="dps-val">0</span></div>
    </div>

    <div id="coin" onclick="clickStar()">⭐</div>

    <div class="shop">
        <div class="upgrade" onclick="buyUpgrade('click')">
            <b id="up-c-name">MULTICLICK</b>
            <span id="cost-txt-1">Cost</span>: <span id="c-cost">100</span>
        </div>
        <div class="upgrade" onclick="buyUpgrade('auto')">
            <b id="up-a-name">AUTO-BOT</b>
            <span id="cost-txt-2">Cost</span>: <span id="a-cost">500</span>
        </div>
    </div>

    <button class="btn-ad" id="ad-btn" onclick="showAd()">📺 REWARD +1000</button>

    <div class="leaderboard">
        <div class="leader-item"><span>1. КИТ_ИНВЕСТОР</span><span>1,200,500</span></div>
        <div class="leader-item my-score"><span>2. <span id="user-name">Player</span></span><span id="player-score">0</span></div>
        <div class="leader-item"><span>3. ZROUTX_FAN</span><span>85,000</span></div>
    </div>

    <script>
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userDisplayName = tg.initDataUnsafe?.user?.first_name || "Player";
        document.getElementById('user-name').innerText = userDisplayName;

        // Данные
        let balance = Number(localStorage.getItem('bal')) || 0;
        let dpc = Number(localStorage.getItem('dpc')) || 1;
        let dps = Number(localStorage.getItem('dps')) || 0;
        let cCost = Number(localStorage.getItem('cCost')) || 100;
        let aCost = Number(localStorage.getItem('aCost')) || 500;
        let currentLang = localStorage.getItem('lang') || 'ru';

        // Реклама
        let AdController = null;
        if (window.Adsgram) {
            AdController = window.Adsgram.init({ blockId: "29401" });
        }

        const i18n = {
            ru: { ad: "📺 БОНУС +1000", cost: "Цена", mc: "МУЛЬТИКЛИК", ab: "АВТО-БОТ", lvl: "УРОВЕНЬ", wait: "Реклама загружается.." },
            en: { ad: "📺 REWARD +1000", cost: "Cost", mc: "MULTICLICK", ab: "AUTO-BOT", lvl: "LEVEL", wait: "Ad is loading.." }
        };

        function changeLang(l) {
            currentLang = l;
            localStorage.setItem('lang', l);
            updateUI();
        }

        function setTheme(t) {
            document.body.className = 'theme-' + t;
            localStorage.setItem('theme', t);
        }

        function clickStar() {
            balance += dpc;
            updateUI();
            saveData();
        }

        function buyUpgrade(type) {
            if (type === 'click' && balance >= cCost) {
                balance -= cCost;
                dpc += 1;
                cCost = Math.floor(cCost * 1.6);
            } else if (type === 'auto' && balance >= aCost) {
                balance -= aCost;
                dps += 1;
                aCost = Math.floor(aCost * 1.6);
            }
            updateUI();
            saveData();
        }

        function updateUI() {
            const t = i18n[currentLang];
            document.getElementById('score').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('player-score').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('dpc-val').innerText = dpc;
            document.getElementById('dps-val').innerText = dps;
            document.getElementById('c-cost').innerText = cCost;
            document.getElementById('a-cost').innerText = aCost;
            
            document.getElementById('ad-btn').innerText = t.ad;
            document.getElementById('cost-txt-1').innerText = t.cost;
            document.getElementById('cost-txt-2').innerText = t.cost;
            document.getElementById('up-c-name').innerText = t.mc;
            document.getElementById('up-a-name').innerText = t.ab;
            
            let lvl = Math.floor(balance / 1000) + 1;
            document.getElementById('lvl-txt').innerText = t.lvl + " " + lvl;
        }

        function saveData() {
            localStorage.setItem('bal', balance);
            localStorage.setItem('dpc', dpc);
            localStorage.setItem('dps', dps);
            localStorage.setItem('cCost', cCost);
            localStorage.setItem('aCost', aCost);
        }

        // Авто-клик
        setInterval(() => {
            if (dps > 0) {
                balance += dps;
                updateUI();
                saveData();
            }
        }, 1000);

        async function showAd() {
            if (!AdController) {
                alert(i18n[currentLang].wait);
                return;
            }
            try {
                const result = await AdController.show();
                if (result.done) {
                    balance += 1000;
                    updateUI();
                    saveData();
                }
            } catch (e) {
                alert(i18n[currentLang].wait);
            }
        }

        // Восстановление темы
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) setTheme(savedTheme);

        updateUI();
    </script>
</body>
</html>
