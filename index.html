<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js?v=16"></script>
    <style>
        body {
            background: #000; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;
        }
        #score { font-size: 50px; font-weight: bold; margin-bottom: 20px; }
        .star { font-size: 100px; cursor: pointer; transition: 0.1s; }
        .star:active { transform: scale(0.9); }
        .ad-btn {
            margin-top: 30px; background: #5865f2; border: none; color: white;
            padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="score">0</div>
    <div class="star" onclick="clickStar()">⭐</div>
    <button class="ad-btn" id="ad-btn" onclick="showAd()">ПОЛУЧИТЬ +1000 ⭐</button>

    <script>
        const tg = window.Telegram.WebApp;
        let score = Number(localStorage.getItem('score')) || 0;
        
        // ТОТ САМЫЙ ПЕРВЫЙ БЛОК
        const AdController = window.Adsgram.init({ blockId: "29573" });

        function updateUI() {
            document.getElementById('score').innerText = score.toLocaleString();
        }

        function clickStar() {
            score++;
            updateUI();
            localStorage.setItem('score', score);
        }

        function showAd() {
            const btn = document.getElementById('ad-btn');
            btn.disabled = true;
            
            AdController.show().then((result) => {
                if (result.done) {
                    score += 1000;
                    updateUI();
                    localStorage.setItem('score', score);
                }
                btn.disabled = false;
            }).catch(() => {
                btn.disabled = false;
            });
        }

        updateUI();
        tg.ready();
    </script>
</body>
</html>
