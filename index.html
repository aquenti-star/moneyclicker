<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://app.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-card: #151515;
            --color-text: #ffffff;
            --color-accent: #8e44ad;
        }
        body.theme-grey { --color-accent: #7f8c8d; }
        body.theme-lime { --color-accent: #2ecc71; }

        body {
            background-color: var(--bg-body);
            color: var(--color-text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
        }

        .header { width: 100%; padding: 15px; background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .balance-section { text-align: center; margin: 20px 0; }
        #score { font-size: 42px; font-weight: 800; color: gold; text-shadow: 0 0 15px rgba(255,215,0,0.3); }

        .star-container { margin: 30px 0; position: relative; }
        .star {
            width: 180px; height: 180px; background: gold;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; box-shadow: 0 0 30px rgba(255,215,0,0.2);
        }
        .star:active { transform: scale(0.92); }

        .progress-container { width: 85%; background: #222; border-radius: 10px; height: 20px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--color-accent); width: 0%; transition: width 0.3s; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 90%; margin: 20px 0; }
        .stat-card { background: var(--bg-card); padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; }

        .btn-group { display: flex; gap: 10px; width: 90%; margin-bottom: 20px; }
        .btn {
            flex: 1; padding: 15px; border: none; border-radius: 12px;
            color: #fff; font-weight: bold; font-size: 14px;
            background: var(--color-accent); /* Теперь обе кнопки зависят от темы */
            cursor: pointer; transition: opacity 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn:disabled { opacity: 0.4; filter: grayscale(1); }

        #leaderboard { width: 90%; background: var(--bg-card); border-radius: 15px; padding: 15px; margin-bottom: 100px; box-sizing: border-box; }
        .leader-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .my-rank { border: 1px solid var(--color-accent); border-radius: 8px; padding: 8px; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="header">
        <b id="user-name">Player</b>
        <div style="display:flex; gap:5px;">
            <button onclick="setTheme('default')" style="width:20px; height:20px; background:#8e44ad; border:none; border-radius:50%"></button>
            <button onclick="setTheme('grey')" style="width:20px; height:20px; background:#7f8c8d; border:none; border-radius:50%"></button>
            <button onclick="setTheme('lime')" style="width:20px; height:20px; background:#2ecc71; border:none; border-radius:50%"></button>
        </div>
    </div>

    <div class="balance-section">
        <small id="lbl-bal">Ваш баланс</small><br>
        <span id="score">0</span> ⭐
    </div>

    <div class="star-container" onclick="clickStar()">
        <div class="star"></div>
    </div>

    <div class="progress-container">
        <div id="pb" class="progress-bar"></div>
    </div>
    <small id="lbl-goal">Цель: 1,000 ⭐</small>

    <div class="stats-grid">
        <div class="stat-card"><span id="st-lbl-1">Всего</span><br><b id="st-total">0</b></div>
        <div class="stat-card"><span id="st-lbl-2">Сегодня</span><br><b id="st-today">0</b></div>
        <div class="stat-card"><span id="st-lbl-3">За час</span><br><b id="st-hour">0</b></div>
    </div>

    <div class="btn-group">
        <button id="ad-btn" class="btn" onclick="showAd()">
            📺 <span id="ad-btn-txt">Реклама</span>
        </button>
        <button id="boost-btn" class="btn" onclick="showBoostAd()">
            🚀 <span id="boost-btn-txt">Буст x2</span>
        </button>
    </div>

    <div id="leaderboard">
        <b id="lbl-top">Топ игроков</b>
        <div id="leaderboard-list" style="margin-top:10px;">
            </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe?.user?.id || 'guest';
    const userDisplayName = tg.initDataUnsafe?.user?.first_name || "Player";
    const p = (key) => `u${userId}_${key}`;

    // --- КОНФИГ FIREBASE (Твоя ссылка) ---
    const firebaseConfig = {
        databaseURL: "https://magicclicker-7ff2a-default-rtdb.europe-west1.firebasedatabase.app/",
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- ПЕРЕМЕННЫЕ ИГРЫ ---
    let balance = Number(localStorage.getItem(p('bal'))) || 0;
    let dpc = 1; 
    let totalViews = Number(localStorage.getItem(p('stTotal'))) || 0;
    let earnedToday = Number(localStorage.getItem(p('stToday'))) || 0;
    let hourlyViews = Number(localStorage.getItem(p('stHour'))) || 0;
    let lastHour = Number(localStorage.getItem(p('lastH'))) || new Date().getHours();
    
    let boostActive = false;
    let boostTimeLeft = 0;

    const AdController = window.Adsgram.init({ blockId: "29401" });

    function clickStar() {
        let gain = boostActive ? dpc * 2 : dpc;
        balance += gain;
        updateUI();
        saveData();
    }

    function updateUI() {
        const fmt = (v) => Math.floor(v).toLocaleString();
        document.getElementById('score').innerText = fmt(balance);
        document.getElementById('st-total').innerText = fmt(totalViews);
        document.getElementById('st-today').innerText = fmt(earnedToday);
        document.getElementById('st-hour').innerText = hourlyViews;

        // Прогресс бар
        let nextGoal = Math.ceil((balance + 1) / 1000) * 1000 || 1000;
        let currentInLevel = balance % 1000;
        document.getElementById('pb').style.width = (currentInLevel / 10) + '%';
        document.getElementById('lbl-goal').innerText = `Цель: ${fmt(nextGoal)} ⭐`;
        
        document.getElementById('user-name').innerText = userDisplayName;
    }

    function showAd() {
        AdController.show().then((result) => {
            if (result.done) {
                balance += 1000;
                totalViews++;
                earnedToday += 1000;
                hourlyViews++;
                updateUI();
                saveData();
            }
        });
    }

    function showBoostAd() {
        if (boostActive) return;
        AdController.show().then((result) => {
            if (result.done) {
                activateBoost();
            }
        });
    }

    function activateBoost() {
        boostActive = true;
        boostTimeLeft = 60;
        const btn = document.getElementById('boost-btn');
        const txt = document.getElementById('boost-btn-txt');
        btn.disabled = true;
        const timer = setInterval(() => {
            txt.innerText = `${boostTimeLeft}с`;
            boostTimeLeft--;
            if (boostTimeLeft < 0) {
                clearInterval(timer);
                boostActive = false;
                btn.disabled = false;
                txt.innerText = "Буст x2";
            }
        }, 1000);
    }

    function setTheme(t) {
        document.body.className = 'theme-' + t;
        localStorage.setItem(p('theme'), t);
    }

    function saveData() {
        // Локально
        localStorage.setItem(p('bal'), balance);
        localStorage.setItem(p('stTotal'), totalViews);
        localStorage.setItem(p('stToday'), earnedToday);
        localStorage.setItem(p('stHour'), hourlyViews);
        localStorage.setItem(p('lastH'), lastHour);

        // В Firebase для Топа
        database.ref('users/' + userId).set({
            name: userDisplayName,
            score: balance
        });
    }

    function syncLeaderboard() {
        database.ref('users').orderByChild('score').limitToLast(5).on('value', (snapshot) => {
            const data = snapshot.val();
            const players = [];
            for (let id in data) { players.push(data[id]); }
            players.sort((a, b) => b.score - a.score);

            const container = document.getElementById('leaderboard-list');
            container.innerHTML = players.map((p, i) => `
                <div class="leader-item ${p.name === userDisplayName ? 'my-rank' : ''}">
                    <span>${i + 1}. ${p.name}</span>
                    <b>${Math.floor(p.score).toLocaleString()} ⭐</b>
                </div>
            `).join('');
        });
    }

    // Инициализация
    const savedTheme = localStorage.getItem(p('theme')) || 'default';
    setTheme(savedTheme);
    updateUI();
    syncLeaderboard();
    tg.ready();
</script>
</body>
</html>
