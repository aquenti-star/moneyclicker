<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Clicker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js?v=16"></script>
    <style>
        :root {
            --bg-body: #08080f; --bg-card: rgba(255, 255, 255, 0.04); --card-border: rgba(255, 255, 255, 0.08);
            --color-text-primary: #fff; --color-text-secondary: rgba(255, 255, 255, 0.6);
            --ad-btn-bg: #6c5ce7;
        }
        body {
            background-color: var(--bg-body); color: var(--color-text-primary); font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh;
            padding: 20px; box-sizing: border-box;
            
            /* Полное отключение выделения текста и синего мерцания при тапе */
            -webkit-touch-callout: none; /* iOS Safari */
            -webkit-user-select: none;   /* Safari */
            -khtml-user-select: none;     /* Konqueror HTML */
            -moz-user-select: none;        /* Firefox */
            -ms-user-select: none;         /* Internet Explorer/Edge */
            user-select: none;             /* Non-prefixed version */
            -webkit-tap-highlight-color: transparent; /* Отключение синего выделения на Android/iOS */
        }

        /* Сетка статистики сверху */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 20px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 18px; padding: 12px; text-align: center; backdrop-filter: blur(10px); }
        .stat-val { font-size: 16px; font-weight: 900; display: block; }
        .stat-lbl { font-size: 9px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 1px; }

        /* Главная карточка баланса */
        .card { width: 100%; background: var(--bg-card); border-radius: 24px; border: 1px solid var(--card-border); padding: 30px; box-sizing: border-box; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .label { font-size: 11px; color: var(--color-text-secondary); font-weight: 700; text-transform: uppercase; }
        #score { font-size: 50px; font-weight: 900; margin: 10px 0; color: #ffca28; text-shadow: 0 0 20px rgba(255, 202, 40, 0.3); }

        /* Кнопка рекламы */
        .ad-button { width: 100%; background: var(--ad-btn-bg); border: none; border-radius: 20px; color: white; padding: 22px; font-weight: 900; font-size: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); text-transform: uppercase; -webkit-tap-highlight-color: transparent; }
        .ad-button:active { transform: scale(0.98); }
        .ad-button:disabled { opacity: 0.5; filter: grayscale(1); }

        /* Карточка с кликабельной звездой */
        .click-card { width: 100%; background: var(--bg-card); border-radius: 24px; border: 1px solid var(--card-border); padding: 40px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s, background-color 0.2s; -webkit-tap-highlight-color: transparent; }
        .click-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.06); }
        
        /* Звезда без фиолетового свечения */
        .main-star { font-size: 100px; }

        /* Уведомление */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #1a1a2e; border: 1px solid #6c5ce7; padding: 15px 25px; border-radius: 50px; transition: 0.5s; z-index: 100; font-weight: 700; font-size: 13px; }
        #toast.show { top: 30px; }
    </style>
</head>
<body>

    <div id="toast">Награда получена! +1000 ⭐</div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-val" id="st-total">0</span>
            <span class="stat-lbl">👁️ Всего</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="st-hourly">0</span>
            <span class="stat-lbl">🎯 За час</span>
        </div>
    </div>

    <div class="card">
        <span class="label">Ваш баланс</span>
        <div id="score">0</div>
        <button id="ad-btn" class="ad-button" onclick="showAd()">Смотреть рекламу (+1000)</button>
    </div>

    <div class="click-card" onclick="clickStar()">
        <span class="main-star">⭐</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        // Разделяем сохранение для каждого аккаунта
        const userId = tg.initDataUnsafe?.user?.id || 'guest';
        const p = (key) => `u${userId}_${key}`;

        let balance = Number(localStorage.getItem(p('bal'))) || 0;
        let totalViews = Number(localStorage.getItem(p('views'))) || 0;
        let hourlyViews = Number(localStorage.getItem(p('hourly_views'))) || 0;
        let lastHour = Number(localStorage.getItem(p('last_hour'))) || new Date().getHours();

        // Рабочий блок
        const AdController = window.Adsgram.init({ blockId: "29401" });

        function updateUI() {
            const fmt = (v) => v.toLocaleString();
            
            // Проверяем, не сменился ли час, чтобы обнулить часовые просмотры
            let nowH = new Date().getHours();
            if (nowH !== lastHour) {
                hourlyViews = 0;
                lastHour = nowH;
                localStorage.setItem(p('hourly_views'), hourlyViews);
                localStorage.setItem(p('last_hour'), lastHour);
            }

            document.getElementById('score').innerText = fmt(balance);
            document.getElementById('st-total').innerText = fmt(totalViews);
            document.getElementById('st-hourly').innerText = fmt(hourlyViews);
        }

        function clickStar() {
            balance += 1;
            updateUI();
            save();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function showAd() {
            const btn = document.getElementById('ad-btn');
            btn.disabled = true;
            btn.innerText = "ЗАГРУЗКА...";

            // Чистый вызов + force_reload
            AdController.show({ force_reload: true }).then((result) => {
                if (result.done) {
                    balance += 1000;
                    totalViews++;
                    hourlyViews++;
                    updateUI();
                    save();
                    showToast();
                }
                btn.disabled = false;
                btn.innerText = "Смотреть рекламу (+1000)";
            }).catch(() => {
                btn.disabled = false;
                btn.innerText = "ПОПРОБОВАТЬ СНОВА";
            });
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function save() {
            localStorage.setItem(p('bal'), balance);
            localStorage.setItem(p('views'), totalViews);
            localStorage.setItem(p('hourly_views'), hourlyViews);
            localStorage.setItem(p('last_hour'), lastHour);
        }

        updateUI();
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
