<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Clicker</title>
    <script src="https://adsgram.ai/sdk.js"></script>
</head>
<body style="background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;">

    <h1>Money Clicker</h1>
    <button id="adBtn" style="padding: 20px; font-size: 20px; border-radius: 15px; background: #0088cc; color: #fff; border: none;">
        СМОТРЕТЬ РЕКЛАМУ
    </button>

    <script>
        const AdController = window.Adsgram.init({ blockId: "29335" });

        document.getElementById('adBtn').onclick = () => {
            AdController.show()
                .then((result) => { alert("Успех! +10 монет"); })
                .catch((result) => { alert("Ошибка или реклама не загружена: " + result.description); });
        };
    </script>
</body>
</html>
