<style>
    .action-buttons {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }
    .btn-half {
        flex: 1;
        padding: 15px;
        border-radius: 12px;
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
    }
    .btn-watch { background: linear-gradient(135deg, #6a11cb, #2575fc); }
    .btn-boost { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .btn-boost.active { filter: hue-rotate(90deg); border: 2px solid #fff; }
    
    #boost-timer {
        font-size: 12px;
        display: block;
        opacity: 0.8;
    }
</style>

<div class="action-buttons">
    <button class="btn-half btn-watch" onclick="showAd()">
        <span>▶ Смотреть</span>
    </button>
    <button id="boost-btn" class="btn-half btn-boost" onclick="showBoostAd()">
        <div>
            <span>🚀 Буст x2</span>
            <span id="boost-timer"></span>
        </div>
    </button>
</div>

<script>
    let boostActive = false;
    let boostTimeLeft = 0;

    // Функция для буста за рекламу
    function showBoostAd() {
        if (boostActive) return; // Чтобы не накладывались

        // Вызываем рекламу (используем твой Adsgram)
        AdController.show().then(() => {
            activateBoost();
        }).catch(() => {
            alert("Реклама не загрузилась");
        });
    }

    function activateBoost() {
        boostActive = true;
        boostTimeLeft = 60;
        document.getElementById('boost-btn').classList.add('active');
        
        const timerInterval = setInterval(() => {
            boostTimeLeft--;
            document.getElementById('boost-timer').innerText = boostTimeLeft + 'с';
            
            if (boostTimeLeft <= 0) {
                clearInterval(timerInterval);
                boostActive = false;
                document.getElementById('boost-btn').classList.remove('active');
                document.getElementById('boost-timer').innerText = '';
            }
        }, 1000);
    }

    // В функцию клика (где начисляются звезды) добавь условие:
    function handleMainClick() {
        let reward = 1; // стандарт
        if (boostActive) {
            reward = 2; // если буст активен, даем x2
        }
        balance += reward;
        updateUI();
    }

    // Обновление лидерборда (Топ-5)
    function updateLeaderboard() {
        const leaderboardData = [
            { name: "Player 1", score: 5000 },
            { name: "Player 2", score: 4200 },
            { name: "Player 3", score: 3800 },
            { name: "Player 4", score: 3100 },
            { name: "Player 5", score: 2500 }
        ];

        const container = document.getElementById('leaderboard-list');
        container.innerHTML = leaderboardData.map((player, index) => `
            <div class="leader-item">
                <span>${index + 1}. ${player.name}</span>
                <b>${player.score} ⭐</b>
            </div>
        `).join('');
    }
</script>
