<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZROUTX | VLESS Keys</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #12121c;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        .header {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 25px;
            text-align: center;
            color: #fff;
        }

        /* Карточка как на фото */
        .card {
            background: #1e1e2d;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .server-info { display: flex; align-items: center; gap: 10px; }
        .flag { font-size: 20px; }
        .name { font-size: 18px; font-weight: 900; }

        .ip-address {
            font-size: 16px;
            color: #b5b5c3;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .type-tag { color: #8e55d3; font-weight: 900; font-size: 14px; }
        .ping { color: #50cd89; font-weight: 600; font-size: 14px; }

        /* Кнопка копировать */
        .copy-btn {
            background: #2b2b40;
            border: 2px solid #3699ff;
            color: white;
            border-radius: 15px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 900;
            font-size: 12px;
            transition: 0.2s;
        }

        .copy-btn:active { background: #3699ff; transform: scale(0.95); }

        /* Уведомление */
        #toast {
            visibility: hidden;
            position: fixed;
            bottom: 30px;
            background: #50cd89;
            color: #fff;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 900;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="header">ZROUTX KEYS</div>

    <div class="container">
        <div class="card">
            <div class="card-top">
                <div class="server-info">
                    <span class="flag">🇫🇮</span>
                    <span class="name">Финляндия [●]</span>
                </div>
            </div>
            <div class="ip-address">82.202.197.*** : 52006</div>
            <div class="card-bottom">
                <span class="type-tag">VLESS</span>
                <span class="ping">~64ms</span>
                <button class="copy-btn" onclick="copyKey('vless://UUID@82.202.197.1:52006?security=reality#Finland')">КОПИРОВАТЬ</button>
            </div>
        </div>

        <div class="card">
            <div class="card-top">
                <div class="server-info">
                    <span class="flag">🇦🇹</span>
                    <span class="name">Austria [*CIDR] YA</span>
                </div>
            </div>
            <div class="ip-address">51.250.121.*** : 443</div>
            <div class="card-bottom">
                <span class="type-tag">VLESS</span>
                <span class="ping">~48ms</span>
                <button class="copy-btn" onclick="copyKey('vless://UUID@51.250.121.1:443?security=reality#Austria')">КОПИРОВАТЬ</button>
            </div>
        </div>
    </div>

    <div id="toast">СКОПИРОВАНО!</div>

    <script>
        function copyKey(key) {
            navigator.clipboard.writeText(key).then(() => {
                const toast = document.getElementById("toast");
                toast.className = "show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
            });
        }
    </script>
</body>
</html>
