<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZROUTX | VLESS Keys</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #12121c;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }
        .header { font-size: 24px; font-weight: 900; margin-bottom: 25px; text-align: center; letter-spacing: 1px; }

        .card {
            background: #1e1e2d;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .server-info { display: flex; align-items: center; gap: 12px; }
        .flag { font-size: 22px; }
        .name { font-size: 17px; font-weight: 900; }

        .ip-address { font-size: 15px; color: #b5b5c3; margin-bottom: 18px; font-weight: 600; letter-spacing: 0.5px; }

        .card-bottom { display: flex; justify-content: space-between; align-items: center; }
        .type-tag { color: #8e55d3; font-weight: 900; font-size: 13px; }
        .ping { color: #50cd89; font-weight: 600; font-size: 13px; }

        /* Кнопка с иконкой квадратов */
        .copy-btn {
            background: #2b2b40;
            border: 2px solid #3699ff;
            color: white;
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .copy-btn:active { background: #3699ff; transform: scale(0.9); }
        
        .copy-btn svg { width: 20px; height: 20px; fill: white; }

        #toast {
            visibility: hidden;
            position: fixed;
            bottom: 30px;
            background: #3699ff;
            color: #fff;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 14px;
            z-index: 100;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="header">ZROUTX KEYS</div>

    <div class="container">
        <div class="card">
            <div class="card-top">
                <div class="server-info">
                    <span class="flag">🇷🇺</span>
                    <span class="name">Россия [⚪]</span>
                </div>
            </div>
            <div class="ip-address">82.202.249.*** : 52006</div>
            <div class="card-bottom">
                <div>
                    <div class="type-tag">VLESS</div>
                    <div class="ping">~64ms</div>
                </div>
                <button class="copy-btn" onclick="copyKey('vless://75807638-6f19-07d0-ae08-38492ee85c88@82.202.249.96:52006?security=tls&encryption=none&insecure=1&headerType=none&fp=chrome&type=tcp&allowInsecure=1&flow=xtls-rprx-vision#%F0%9F%87%B7%F0%9F%87%BA%20Russia%20%5B*CIDR%5D')">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/></svg>
                </button>
            </div>
        </div>
        </div>

    <div id="toast">СКОПИРОВАНО!</div>

    <script>
        function copyKey(key) {
            const el = document.createElement('textarea');
            el.value = key;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
        }
    </script>
</body>
</html>
